name: agrosense
description: Ground Data Collection + Field Analysis
publish_to: 'none'
version: 5.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.1
  google_sign_in: ^6.2.1
  googleapis: ^11.4.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  connectivity_plus: ^6.0.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
